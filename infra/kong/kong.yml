_format_version: "3.0"
plugins:
- config:
    credentials: true
    exposed_headers:
    - X-Total-Count
    headers:
    - Accept
    - Authorization
    - Content-Type
    - X-Requested-With
    max_age: 3600
    methods:
    - GET
    - HEAD
    - PUT
    - PATCH
    - POST
    - DELETE
    - OPTIONS
    - TRACE
    - CONNECT
    origins:
    - http://localhost:3000
    - http://localhost:5173
    preflight_continue: false
  enabled: true
  name: cors
  protocols:
  - grpc
  - grpcs
  - http
  - https
- config:
    custom_fields_by_lua: {}
    path: /dev/stdout
    reopen: true
  enabled: true
  name: file-log
  protocols:
  - grpc
  - grpcs
  - http
  - https
- config:
    day: null
    error_code: 429
    error_message: API rate limit exceeded
    fault_tolerant: false
    header_name: null
    hide_client_headers: false
    hour: null
    limit_by: ip
    minute: null
    month: null
    path: null
    policy: local
    redis_database: 0
    redis_host: null
    redis_password: null
    redis_port: 6379
    redis_server_name: null
    redis_ssl: false
    redis_ssl_verify: false
    redis_timeout: 2000
    redis_username: null
    second: 10
    sync_rate: -1
    year: null
  enabled: true
  name: rate-limiting
  protocols:
  - grpc
  - grpcs
  - http
  - https
services:
- connect_timeout: 60000
  enabled: true
  host: content-service
  name: content-service
  port: 5000
  protocol: http
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    methods:
    - GET
    - PUT
    - POST
    - PATCH
    - DELETE
    - OPTIONS
    name: content-api-v1
    path_handling: v0
    paths:
    - /api/v1
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: false
  - https_redirect_status_code: 426
    methods:
    - GET
    name: health-check
    path_handling: v0
    paths:
    - /health
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: false
  write_timeout: 60000
