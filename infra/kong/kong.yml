_format_version: "3.4"

# === Services ===
services:
  - name: content-service
    url: http://content-service:5000
    connect_timeout: 6000
    write_timeout: 6000
    read_timeout: 6000
    routes:
      - name: content-route
        paths:
          - /api
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
    plugins:
      # Rate limiting: 100 req/min per consumer (if authenticated)
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
          hide_client_headers: false
          
      # CORS for frontend development
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:5173  # Vite frontend
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          exposed_headers:
            - X-Total-Count
          credentials: true
          max_age: 3600

      # Request/Response logging (to stdout)
      - name: file-log
        config:
          path: /dev/stdout
          reopen: true
          keep_alive: true

